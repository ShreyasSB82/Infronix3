<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>INFRONIX — AI Infrastructure Layout Engine</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Inter", sans-serif;
    }

    body {
      background: #05070d;
      color: white;
      overflow: hidden;
    }

    #background {
      position: fixed;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .title {
      font-size: 4rem;
      font-weight: 600;
      letter-spacing: 3px;
      background: linear-gradient(90deg, #6ee7ff, #9f7aea);
      -webkit-background-clip: text;
      color: transparent;
    }

    .subtitle {
      margin-top: 10px;
      font-size: 1.2rem;
      opacity: 0.8;
    }

    .description {
      margin-top: 15px;
      max-width: 500px;
      opacity: 0.6;
    }

    .buttons {
      margin-top: 40px;
      display: flex;
      gap: 20px;
    }

    .btn {
      padding: 14px 28px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      cursor: pointer;
      text-decoration: none;
      color: white;
      transition: all .3s ease;
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.08);
      transform: translateY(-2px);
    }

    .btn-primary {
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      border: none;
      color: #000;
      font-weight: 600;
    }

    .footer {
      position: absolute;
      bottom: 20px;
      width: 100%;
      text-align: center;
      font-size: .8rem;
      opacity: .5;
    }
  </style>
</head>

<body>

  <div id="background"></div>

  <div class="hero">

    <div class="title">INFRONIX</div>

    <div class="subtitle">
      AI Infrastructure Layout Engine
    </div>

    <div class="description">
      Generate regulation-compliant urban layouts with automated road,
      utility and infrastructure planning.
    </div>

    <div class="buttons">
      <a href="/app" class="btn btn-primary">Start Planning</a>
      <a href="/login" class="btn">Login</a>
    </div>

  </div>

  <div class="footer">
    Smart Infrastructure Planning System
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r121/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
  <script>

    VANTA.NET({
      el: "#background",
      mouseControls: true,
      touchControls: true,
      gyroControls: false,
      minHeight: 200.00,
      minWidth: 200.00,
      scale: 1.0,
      scaleMobile: 1.0,
      color: 0x4facfe,
      backgroundColor: 0x05070d,
      points: 12.0,
      maxDistance: 22.0,
      spacing: 18.0
    })

  </script>

</body>

</html>
