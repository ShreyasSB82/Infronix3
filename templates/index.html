<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LandMark — Interactive Land Selection</title>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<!-- Leaflet Draw -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>

<link rel="stylesheet" href="/static/css/unified-header.css">
<script src="/static/js/unified-header.js?v=20260408" defer></script>

<style>
/* ─── Reset ─────────────────────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden;background:#000;color:#fff}


/* ─── Map View ───────────────────────────────────────────────── */
#map-view{
  position:fixed;inset:0;z-index:10;
  display: block;
  opacity:1;
  pointer-events:all;
}

#map{position:absolute;inset:0;background:#1a2540}

/* top bar */
#topbar{
  position:absolute;top:0;left:0;right:0;height:58px;z-index:1000;
  background:rgba(16,24,52,.88);backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(255,255,255,.1);
  display:flex;align-items:center;gap:12px;padding:0 16px;
}
.logo-sm{
  font-weight:800;font-size:1.15rem;letter-spacing:1px;
  background:linear-gradient(135deg,#60b4ff,#a8d8a8);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
#back-btn{
  background:rgba(96,180,255,.12);border:1px solid rgba(96,180,255,.35);
  color:#60b4ff;padding:.35rem .9rem;border-radius:.4rem;cursor:pointer;
  font-size:.8rem;transition:background .2s;white-space:nowrap;
}
#back-btn:hover{background:rgba(96,180,255,.28)}

/* search bar */
#search-wrap{
  flex:1;max-width:380px;position:relative;
}
#search-input{
  width:100%;background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.14);
  color:#fff;padding:.42rem .9rem .42rem 2.2rem;
  border-radius:.45rem;font-size:.85rem;outline:none;
  transition:border-color .2s;
}
#search-input:focus{border-color:#60b4ff}
#search-input::placeholder{color:rgba(255,255,255,.35)}
.search-icon{
  position:absolute;left:.65rem;top:50%;transform:translateY(-50%);
  font-size:.85rem;opacity:.5;pointer-events:none;
}
#search-results{
  position:absolute;top:calc(100% + 4px);left:0;right:0;
  background:rgba(16,24,52,.98);border:1px solid rgba(255,255,255,.12);
  border-radius:.45rem;overflow:hidden;z-index:2000;display:none;
}
.sr-item{
  padding:.55rem .9rem;font-size:.82rem;cursor:pointer;
  border-bottom:1px solid rgba(255,255,255,.06);color:rgba(255,255,255,.8);
  transition:background .15s;
}
.sr-item:last-child{border-bottom:none}
.sr-item:hover{background:rgba(96,180,255,.15);color:#fff}

/* draw hint */
#draw-hint{
  margin-left:auto;font-size:.78rem;color:rgba(255,255,255,.4);
  display:flex;align-items:center;gap:.4rem;white-space:nowrap;
}

/* ─── Side Panel ─────────────────────────────────────────────── */
#panel{
  position:absolute;top:58px;right:0;bottom:0;width:300px;z-index:900;
  background:rgba(16,24,52,.88);backdrop-filter:blur(16px);
  border-left:1px solid rgba(255,255,255,.09);
  display:flex;flex-direction:column;
}
.panel-head{
  padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.07);
  display:flex;align-items:center;justify-content:space-between;
}
.panel-head h2{font-size:.95rem;font-weight:600;color:rgba(255,255,255,.9)}
#plot-badge{
  background:#60b4ff;color:#000;font-size:.7rem;font-weight:700;
  padding:.15rem .55rem;border-radius:1rem;min-width:22px;text-align:center;
}
#plots-list{flex:1;overflow-y:auto;padding:10px}
#plots-list::-webkit-scrollbar{width:3px}
#plots-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}

.plot-card{
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  border-radius:.5rem;padding:10px 12px;margin-bottom:8px;
  transition:border-color .2s,background .2s;
}
.plot-card:hover{background:rgba(96,180,255,.07);border-color:rgba(96,180,255,.25)}
.pc-name{font-size:.88rem;font-weight:600;color:#fff;margin-bottom:3px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pc-meta{font-size:.73rem;color:rgba(255,255,255,.38);margin-bottom:7px}
.pc-actions{display:flex;gap:6px}
.btn-xs{
  padding:.2rem .65rem;border-radius:.3rem;border:none;cursor:pointer;
  font-size:.72rem;font-weight:600;transition:background .2s;
}
.btn-view{background:rgba(96,180,255,.18);color:#60b4ff}
.btn-view:hover{background:rgba(96,180,255,.35)}
.btn-del{background:rgba(239,83,80,.18);color:#ef5350}
.btn-del:hover{background:rgba(239,83,80,.35)}

.empty{
  text-align:center;padding:2.5rem 1rem;color:rgba(255,255,255,.25);
  font-size:.85rem;line-height:1.6;
}
.empty-icon{font-size:2rem;margin-bottom:.5rem}

/* ─── Save Modal ─────────────────────────────────────────────── */
#modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:3000;
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
#modal-bg.show{opacity:1;pointer-events:all}
.modal{
  background:#101830;border:1px solid rgba(255,255,255,.13);
  border-radius:.75rem;padding:1.5rem;width:360px;
  transform:translateY(10px);transition:transform .25s;
}
#modal-bg.show .modal{transform:translateY(0)}
.modal h3{font-size:1rem;font-weight:700;margin-bottom:1rem;color:rgba(255,255,255,.9)}
.modal label{font-size:.78rem;color:rgba(255,255,255,.45);display:block;margin-bottom:.3rem}
.modal input{
  width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.13);
  color:#fff;padding:.55rem .8rem;border-radius:.4rem;font-size:.88rem;
  outline:none;margin-bottom:.2rem;transition:border-color .2s;
}
.modal input:focus{border-color:#60b4ff}
.modal-area{font-size:.75rem;color:rgba(255,255,255,.3);margin-bottom:1.1rem}
.modal-actions{display:flex;justify-content:flex-end;gap:.6rem}
.btn-primary{
  background:#60b4ff;color:#000;border:none;padding:.5rem 1.3rem;
  border-radius:.4rem;cursor:pointer;font-weight:700;font-size:.88rem;
  transition:background .2s;
}
.btn-primary:hover{background:#90caf9}
.btn-ghost{
  background:transparent;border:1px solid rgba(255,255,255,.15);
  color:rgba(255,255,255,.6);padding:.5rem 1rem;border-radius:.4rem;
  cursor:pointer;font-size:.88rem;transition:background .2s;
}
.btn-ghost:hover{background:rgba(255,255,255,.06)}

/* ─── Toast ─────────────────────────────────────────────────── */
#toast{
  position:fixed;bottom:2rem;left:50%;z-index:9999;
  transform:translateX(-50%) translateY(80px);
  background:rgba(16,24,52,.97);border:1px solid rgba(96,180,255,.35);
  color:#fff;padding:.5rem 1.3rem;border-radius:.5rem;font-size:.83rem;
  transition:transform .3s ease;white-space:nowrap;
  pointer-events:none;
}
#toast.show{transform:translateX(-50%) translateY(0)}

/* ─── Coordinate HUD ────────────────────────────────────────── */
#coord-hud{
  position:absolute;bottom:28px;left:10px;z-index:950;
  background:rgba(16,24,52,.88);backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.1);
  color:rgba(255,255,255,.65);padding:.28rem .75rem;
  border-radius:.35rem;font-size:.72rem;font-family:'Courier New',monospace;
  pointer-events:none;white-space:nowrap;letter-spacing:.4px;
  transition:opacity .2s;
}
#coord-hud.dim{opacity:.4}

/* coord row inside plot cards */
.pc-coords{
  font-size:.7rem;font-family:'Courier New',monospace;
  color:rgba(255,255,255,.38);margin-bottom:6px;
  display:flex;align-items:center;gap:6px;
}
.btn-copy-coord{
  background:rgba(96,180,255,.12);border:1px solid rgba(96,180,255,.2);
  color:#60b4ff;font-size:.65rem;padding:.1rem .4rem;
  border-radius:.25rem;cursor:pointer;white-space:nowrap;
  transition:background .15s;flex-shrink:0;
}
.btn-copy-coord:hover{background:rgba(96,180,255,.28)}

/* coord pill shown in coord-search result */
.sr-coord-pill{
  display:inline-block;background:rgba(96,180,255,.18);
  color:#60b4ff;font-size:.7rem;padding:.1rem .5rem;
  border-radius:1rem;margin-right:.4rem;font-family:monospace;
}

/* ─── Leaflet tweaks ─────────────────────────────────────────── */
.leaflet-top{margin-top:68px!important}
.leaflet-right .leaflet-control{margin-right:312px!important}
.leaflet-bottom{margin-bottom:6px}
.leaflet-control-zoom a{
  background:rgba(16,24,52,.92)!important;color:#90c4f0!important;
  border-color:rgba(255,255,255,.14)!important;
}
.leaflet-control-zoom a:hover{background:rgba(30,45,90,.95)!important}
.leaflet-draw-toolbar a{
  background-color:rgba(16,24,52,.92)!important;
  border-bottom-color:rgba(255,255,255,.12)!important;
}
.leaflet-draw-toolbar a:hover{background-color:rgba(30,45,90,.95)!important}
.leaflet-draw-actions a{background:#182850!important;color:#90c4f0!important}
.leaflet-draw-actions a:hover{background:#223870!important}
.leaflet-popup-content-wrapper{
  background:rgba(16,24,52,.97)!important;border:1px solid rgba(255,255,255,.12)!important;
  color:#fff!important;border-radius:.5rem!important;
}
.leaflet-popup-tip{background:rgba(16,24,52,.97)!important}
/* Layer control dark theme */
.leaflet-control-layers{
  background:rgba(16,24,52,.95)!important;
  border:1px solid rgba(255,255,255,.12)!important;
  border-radius:.5rem!important;
  backdrop-filter:blur(10px)!important;
  padding:4px!important;
  color:rgba(255,255,255,.8)!important;
}
.leaflet-control-layers-list label{color:rgba(255,255,255,.75)!important;font-size:.8rem}
.leaflet-control-layers-separator{border-top-color:rgba(255,255,255,.1)!important}
.leaflet-control-layers-toggle{
  background-color:rgba(16,24,52,.92)!important;
}

/* India badge in topbar */
#india-badge{
  display:flex;align-items:center;gap:5px;
  background:rgba(255,153,51,.12);border:1px solid rgba(255,153,51,.3);
  color:rgba(255,200,100,.9);padding:.3rem .75rem;
  border-radius:.4rem;font-size:.78rem;white-space:nowrap;
  font-weight:600;letter-spacing:.3px;
}

/* Layer status pill */
#layer-status{
  position:absolute;bottom:28px;left:50%;transform:translateX(-50%);
  z-index:950;
  background:rgba(16,24,52,.88);backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.1);
  color:rgba(255,255,255,.55);padding:.25rem .8rem;
  border-radius:1rem;font-size:.72rem;white-space:nowrap;
  pointer-events:none;
  transition:opacity .4s;
}
#layer-status.hidden{opacity:0}
</style>

<body>

<!-- ═══════════ MAP VIEW ═══════════ -->
<div id="map-view" class="show">

  <!-- top bar -->
  <div id="topbar">
    <span class="logo-sm">LandMark</span>

    <div id="search-wrap">
      <span class="search-icon">🔍</span>
      <input id="search-input" type="text" placeholder="Search India — city, district, village or lat, lng…" autocomplete="off"/>
      <div id="search-results"></div>
    </div>

    <div id="india-badge">🇮🇳 India Focus</div>
    
    <a href="/viewer" id="btn-cad-viewer" style="background:rgba(96,180,255,0.15); border:1px solid rgba(96,180,255,0.4); color:#60b4ff; padding:.35rem .9rem; border-radius:.4rem; font-size:.8rem; font-weight:600; text-decoration:none; transition:all 0.2s; white-space:nowrap;">📐 Open 3D Viewer</a>

    <div id="draw-hint">
      <span>✏️</span><span>Draw a polygon to select land</span>
    </div>
  </div>

  <div id="map"></div>
  <div id="coord-hud">Move cursor over map</div>
  <div id="layer-status" class="hidden"></div>

  <!-- side panel -->
  <div id="panel">
    <div class="panel-head">
      <h2>Saved Plots</h2>
      <span id="plot-badge">0</span>
    </div>
    <div id="plots-list">
      <div class="empty">
        <div class="empty-icon">🗺️</div>
        No plots yet.<br>Draw on the map to select land.
      </div>
    </div>
  </div>
</div>

<!-- ═══════════ SAVE MODAL ═══════════ -->
<div id="modal-bg">
  <div class="modal">
    <h3>Name Your Plot</h3>
    <label>Plot name</label>
    <input id="plot-name" type="text" placeholder="e.g. Riverside Farm, Block A…" maxlength="80"/>
    <div class="modal-area" id="modal-area-text"></div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="cancelSave()">Cancel</button>
      <button class="btn-primary" onclick="confirmSave()">Save Plot</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- ═══════════ SCRIPTS ═══════════ -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

<script>
// ══════════════════════════════════════════════

// ── Animate ───────────────────────────────
let mouseX = 0, mouseY = 0;
window.addEventListener('DOMContentLoaded', () => {
  initMap();
});


// ══════════════════════════════════════════════
//  LEAFLET MAP
// ══════════════════════════════════════════════

let mapReady = false, map, drawnItems;
const plotLayers = {};  // id → Leaflet layer

function showLayerStatus(msg) {
  const el = document.getElementById('layer-status');
  el.textContent = msg;
  el.classList.remove('hidden');
  clearTimeout(showLayerStatus._t);
  showLayerStatus._t = setTimeout(() => el.classList.add('hidden'), 3000);
}

function initMap() {
  mapReady = true;

  // Centred on India, zoom 5 shows the whole country nicely
  map = L.map('map', { center:[20.5937, 78.9629], zoom:5, zoomControl:false });

  // ── Base layers ───────────────────────────────────────────────
  const darkBase = L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    {
      attribution:'© OpenStreetMap contributors',
      maxZoom:20
    }
  );

  // ISRO Bhuvan WMS — satellite imagery of India
  // Endpoint: https://bhuvan-app1.nrsc.gov.in/2dresources/bhuvan/wms
  // Layer "india3" is the national satellite mosaic (Resourcesat-2 / Cartosat)
  const bhuvanSat = L.tileLayer.wms(
    'https://bhuvan-app1.nrsc.gov.in/2dresources/bhuvan/wms',
    {
      layers: 'india3',
      format: 'image/jpeg',
      version: '1.1.1',
      transparent: false,
      attribution: '🛰️ <a href="https://bhuvan.nrsc.gov.in/">ISRO/NRSC Bhuvan</a> — Resourcesat Satellite Imagery',
      maxZoom: 18,
    }
  );

  // Default to dark base; switch to Bhuvan later via layer control
  darkBase.addTo(map);

  // ── ISRO Bhuvan overlay layers ────────────────────────────────
  // State boundaries from Bhuvan WMS
  const bhuvanStates = L.tileLayer.wms(
    'https://bhuvan-app1.nrsc.gov.in/2dresources/bhuvan/wms',
    {
      layers: 'india_state',
      format: 'image/png',
      version: '1.1.1',
      transparent: true,
      opacity: 0.85,
      attribution: '© ISRO/NRSC Bhuvan',
    }
  );

  // District boundaries from Bhuvan WMS
  const bhuvanDistricts = L.tileLayer.wms(
    'https://bhuvan-app1.nrsc.gov.in/2dresources/bhuvan/wms',
    {
      layers: 'india_district',
      format: 'image/png',
      version: '1.1.1',
      transparent: true,
      opacity: 0.7,
      attribution: '© ISRO/NRSC Bhuvan',
    }
  );

  // Tehsil (sub-district) boundaries — useful at high zoom for land selection
  const bhuvanTehsils = L.tileLayer.wms(
    'https://bhuvan-app1.nrsc.gov.in/2dresources/bhuvan/wms',
    {
      layers: 'india_tehsil',
      format: 'image/png',
      version: '1.1.1',
      transparent: true,
      opacity: 0.6,
      attribution: '© ISRO/NRSC Bhuvan',
    }
  );

  // ── Layer control ─────────────────────────────────────────────
  const baseMaps = {
    '🗺️ OpenStreetMap': darkBase,
    '🛰️ ISRO Bhuvan Satellite': bhuvanSat,
  };
  const overlayMaps = {
    '📍 State Boundaries (Bhuvan)': bhuvanStates,
    '🔲 District Boundaries (Bhuvan)': bhuvanDistricts,
    '🔹 Tehsil Boundaries (Bhuvan)': bhuvanTehsils,
  };
  L.control.layers(baseMaps, overlayMaps, { position:'topright', collapsed:true })
    .addTo(map);

  // Notify user when switching to Bhuvan satellite
  map.on('baselayerchange', e => {
    if (e.name.includes('Bhuvan')) {
      showLayerStatus('🛰️ ISRO Bhuvan — Resourcesat-2 / Cartosat satellite imagery');
    }
  });
  map.on('overlayadd', e => {
    showLayerStatus('✓ ' + e.name + ' added');
  });

  L.control.zoom({ position:'bottomright' }).addTo(map);

  // Draw layer
  drawnItems = new L.FeatureGroup().addTo(map);

  const drawCtrl = new L.Control.Draw({
    position:'topleft',
    edit:{ featureGroup:drawnItems, remove:true },
    draw:{
      polygon:{
        allowIntersection:false,
        drawError:{ color:'#ef5350', message:'Lines cannot cross!' },
        shapeOptions:{ color:'#60b4ff', fillOpacity:.22, weight:2 }
      },
      rectangle:{
        shapeOptions:{ color:'#60b4ff', fillOpacity:.22, weight:2 }
      },
      circle:false, polyline:false, marker:false, circlemarker:false
    }
  });
  map.addControl(drawCtrl);

  // Created event → open save modal
  map.on(L.Draw.Event.CREATED, e => {
    pendingLayer = e.layer;
    const coords = flatCoords(pendingLayer);
    const area = calcArea(coords);
    document.getElementById('modal-area-text').textContent =
      coords.length + ' vertices · ≈' + fmtArea(area);
    document.getElementById('plot-name').value = '';
    showModal();
  });

  // Deleted from map toolbar → remove from API
  map.on(L.Draw.Event.DELETED, e => {
    e.layers.eachLayer(layer => {
      const id = Object.keys(plotLayers).find(k => plotLayers[k] === layer);
      if (id) deletePlot(id, false);
    });
  });

  // ── Coordinate HUD — live cursor position ──
  const hud = document.getElementById('coord-hud');
  map.on('mousemove', e => {
    hud.textContent = fmtCoord(e.latlng.lat) + ',  ' + fmtCoord(e.latlng.lng);
    hud.classList.remove('dim');
  });
  map.on('mouseout', () => hud.classList.add('dim'));

  // ── Click anywhere to pin & show coordinates ──
  let isDrawing = false;
  map.on('draw:drawstart', () => { isDrawing = true; });
  map.on('draw:drawstop',  () => { isDrawing = false; });

  let clickPin = null;
  map.on('click', e => {
    if (isDrawing) return;
    if (clickPin) map.removeLayer(clickPin);
    const lat = e.latlng.lat, lng = e.latlng.lng;
    const coordStr = fmtCoord(lat) + ', ' + fmtCoord(lng);
    clickPin = L.circleMarker([lat, lng], {
      radius:7, color:'#ffd580', fillColor:'#ffd580', fillOpacity:.6, weight:2
    }).addTo(map);
    clickPin.bindPopup(
      `<div style="font-family:'Courier New',monospace;font-size:.82rem;line-height:1.7">
        <b style="font-size:.85rem">📍 Pinned Location</b><br>
        Lat: <b>${fmtCoord(lat)}</b><br>
        Lng: <b>${fmtCoord(lng)}</b><br>
        <span style="font-size:.7rem;opacity:.55">${coordStr}</span><br>
        <button onclick="copyText('${coordStr}')"
          style="margin-top:6px;padding:.2rem .7rem;background:rgba(96,180,255,.2);
          border:1px solid rgba(96,180,255,.4);color:#90c4f0;border-radius:.3rem;
          cursor:pointer;font-size:.72rem;">Copy</button>
      </div>`,
      { maxWidth:220 }
    ).openPopup();
  });

  loadPlots();
}

// ── Search ────────────────────────────────
let searchTimeout;
const searchInput = document.getElementById('search-input');
const searchResults = document.getElementById('search-results');

// Try to parse "lat, lng" or "lat lng" decimal degree strings
function parseLatLng(q) {
  const m = q.trim().match(/^(-?\d{1,3}\.?\d*)[,\s]+(-?\d{1,3}\.?\d*)$/);
  if (!m) return null;
  const lat = parseFloat(m[1]), lng = parseFloat(m[2]);
  if (lat >= -90 && lat <= 90 && lng >= -180 && lng <= 180) return [lat, lng];
  return null;
}

searchInput.addEventListener('input', () => {
  clearTimeout(searchTimeout);
  const q = searchInput.value.trim();
  if (q.length < 2) { searchResults.style.display='none'; return; }

  // Instant coord detection — show jump option immediately
  const coords = parseLatLng(q);
  if (coords) {
    const [lat, lng] = coords;
    searchResults.innerHTML = `
      <div class="sr-item coord-jump" data-lat="${lat}" data-lng="${lng}">
        <span class="sr-coord-pill">📍 ${fmtCoord(lat)}, ${fmtCoord(lng)}</span>
        Jump to coordinates
      </div>`;
    searchResults.style.display = 'block';
    return;
  }

  if (q.length < 3) return;
  searchTimeout = setTimeout(() => doSearch(q), 380);
});

searchInput.addEventListener('keydown', e => {
  if (e.key==='Enter') {
    const first = searchResults.querySelector('.sr-item');
    if (first) first.click();
  }
  if (e.key==='Escape') { searchResults.style.display='none'; searchInput.blur(); }
});

document.addEventListener('click', e => {
  if (!e.target.closest('#search-wrap')) searchResults.style.display='none';
});

// Delegate coord-jump clicks (also handles dynamically added items)
searchResults.addEventListener('click', e => {
  const item = e.target.closest('.coord-jump');
  if (!item) return;
  const lat = parseFloat(item.dataset.lat), lng = parseFloat(item.dataset.lng);
  map.setView([lat, lng], 14);
  // Drop a temporary pin
  const pin = L.circleMarker([lat, lng], {
    radius:8, color:'#60b4ff', fillColor:'#60b4ff',
    fillOpacity:.5, weight:2
  }).addTo(map);
  pin.bindPopup(`<b>${fmtCoord(lat)}, ${fmtCoord(lng)}</b>`).openPopup();
  setTimeout(() => map.removeLayer(pin), 8000);
  searchInput.value = `${fmtCoord(lat)}, ${fmtCoord(lng)}`;
  searchResults.style.display = 'none';
});

async function doSearch(q) {
  try {
    const res = await fetch('/api/geocode?q=' + encodeURIComponent(q));
    const data = await res.json();
    if (!data.length) {
      searchResults.innerHTML='<div class="sr-item" style="pointer-events:none;opacity:.5">No results found</div>';
      searchResults.style.display='block'; return;
    }
    searchResults.innerHTML = data.slice(0,5).map((d,i) =>
      `<div class="sr-item" data-i="${i}" data-lat="${d.lat}" data-lon="${d.lon}"
        data-bb="${d.boundingbox ? d.boundingbox.join(',') : ''}">${esc(d.display_name)}</div>`
    ).join('');
    searchResults.style.display = 'block';
    searchResults.querySelectorAll('.sr-item:not(.coord-jump)').forEach(el => {
      el.addEventListener('click', () => {
        const bb = el.dataset.bb.split(',').filter(Boolean);
        if (bb.length===4) map.fitBounds([[+bb[0],+bb[2]],[+bb[1],+bb[3]]], {padding:[30,30]});
        else map.setView([+el.dataset.lat, +el.dataset.lon], 12);
        searchInput.value = el.textContent;
        searchResults.style.display = 'none';
      });
    });
  } catch(e) { showToast('Search failed'); }
}


// ── Plots API ────────────────────────────
let allPlotsGlobal = [];
async function loadPlots() {
  try {
    const res = await fetch('/api/plots');
    const plots = await res.json();
    allPlotsGlobal = plots;
    renderPlots(plots);
  } catch(e) { console.error(e); }
}

function renderPlots(plots) {
  document.getElementById('plot-badge').textContent = plots.length;
  const list = document.getElementById('plots-list');

  if (!plots.length) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">🗺️</div>No plots yet.<br>Draw on the map to select land.</div>`;
    return;
  }

  list.innerHTML = plots.map(p => {
    const [cLat, cLng] = centroid(p.coordinates);
    const coordStr = fmtCoord(cLat) + ', ' + fmtCoord(cLng);
    return `
    <div class="plot-card" id="pc-${p.id}">
      <div class="pc-name">${esc(p.name)}</div>
      <div class="pc-meta">${p.area ? fmtArea(p.area)+' · ' : ''}${p.coordinates.length} pts · ${fmtDate(p.created_at)}</div>
      <div class="pc-coords">
        <span>${coordStr}</span>
        <button class="btn-copy-coord" onclick="copyText('${coordStr}')">Copy</button>
      </div>
      <div class="pc-actions">
        <button class="btn-xs btn-view" onclick="focusPlot('${p.id}')">View</button>
        <button class="btn-xs" style="background:rgba(34,197,94,0.15);color:#4ade80;border-color:rgba(34,197,94,0.3)" onclick="openGenerator('${p.id}')">Generate</button>
        <button class="btn-xs btn-del" onclick="deletePlot('${p.id}',true)">Delete</button>
      </div>
    </div>`;
  }).join('');

  // draw any plots not yet on map (loaded from a previous session)
  plots.forEach(p => {
    if (!plotLayers[p.id]) {
      const latlngs = p.coordinates.map(c=>[c[0],c[1]]);
      const layer = L.polygon(latlngs, { color:'#60b4ff', fillOpacity:.2, weight:2 });
      const [cLat,cLng] = centroid(p.coordinates);
      layer.bindPopup(plotPopupHtml(p.name, p.area, cLat, cLng));
      drawnItems.addLayer(layer);
      plotLayers[p.id] = layer;
    }
  });
}

function focusPlot(id) {
  const layer = plotLayers[id];
  if (!layer) return;
  map.fitBounds(layer.getBounds(), {padding:[60,80]});
  layer.setStyle({ color:'#a5d6a7', fillOpacity:.35 });
  setTimeout(() => layer.setStyle({ color:'#60b4ff', fillOpacity:.2 }), 1600);
  layer.openPopup();
}

async function deletePlot(id, removeFromMap) {
  if (!confirm('Delete this plot?')) return;
  try {
    await fetch('/api/plots/'+id, { method:'DELETE' });
    if (removeFromMap && plotLayers[id]) drawnItems.removeLayer(plotLayers[id]);
    delete plotLayers[id];
    showToast('Plot deleted');
    loadPlots();
  } catch(e) { showToast('Delete failed'); }
}

function openGenerator(id) {
    const p = allPlotsGlobal.find(x => x.id === id);
    if (!p) return;
    localStorage.setItem('selectedPlot', JSON.stringify(p));
    window.location.href = '/plot-details?plot_id=' + encodeURIComponent(id);
}


// ── Save Modal ───────────────────────────
let pendingLayer = null;

function showModal() {
  document.getElementById('modal-bg').classList.add('show');
  setTimeout(() => document.getElementById('plot-name').focus(), 80);
}
function cancelSave() {
  document.getElementById('modal-bg').classList.remove('show');
  pendingLayer = null;
}

document.getElementById('plot-name').addEventListener('keydown', e => {
  if (e.key==='Enter') confirmSave();
  if (e.key==='Escape') cancelSave();
});

async function confirmSave() {
  if (!pendingLayer) return;
  const name = document.getElementById('plot-name').value.trim() || 'Unnamed Plot';
  const coords = flatCoords(pendingLayer);
  const area = calcArea(coords);
  try {
    const res = await fetch('/api/plots', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ name, coordinates:coords, area })
    });
    const plot = await res.json();
    const [cLat,cLng] = centroid(coords);
    pendingLayer.bindPopup(plotPopupHtml(name, area, cLat, cLng));
    drawnItems.addLayer(pendingLayer);
    plotLayers[plot.id] = pendingLayer;
    pendingLayer = null;
    document.getElementById('modal-bg').classList.remove('show');
    showToast('✓ "'+name+'" saved');
    loadPlots();
  } catch(e) { showToast('Save failed'); }
}


// ── Utilities ────────────────────────────
function flatCoords(layer) {
  let ll = layer.getLatLngs();
  if (Array.isArray(ll[0])) ll = ll[0]; // polygon outer ring
  return ll.map(p => [p.lat, p.lng]);
}

function calcArea(coords) {
  // Shoelace / spherical excess approximation → km²
  if (coords.length < 3) return 0;
  const R = 6371;
  let area = 0;
  for (let i=0; i<coords.length; i++) {
    const j=(i+1)%coords.length;
    const [la1,lo1]=coords[i], [la2,lo2]=coords[j];
    area += (lo2-lo1)*Math.PI/180 * (2 + Math.sin(la1*Math.PI/180) + Math.sin(la2*Math.PI/180));
  }
  return Math.abs(area*R*R/2);
}

function fmtArea(km2) {
  if (km2>=1e6) return (km2/1e6).toFixed(2)+' M km²';
  if (km2>=1000) return (km2/1000).toFixed(2)+' k km²';
  if (km2>=1)   return km2.toFixed(2)+' km²';
  return (km2*1e6).toFixed(0)+' m²';
}

function fmtDate(iso) {
  return new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}

function fmtCoord(n) {
  return parseFloat(n).toFixed(5);
}

function centroid(coords) {
  const lat = coords.reduce((s,c) => s+c[0], 0) / coords.length;
  const lng = coords.reduce((s,c) => s+c[1], 0) / coords.length;
  return [lat, lng];
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(
    () => showToast('Copied: ' + text),
    () => showToast('Copy failed')
  );
}

function plotPopupHtml(name, area, cLat, cLng) {
  const coordStr = fmtCoord(cLat) + ', ' + fmtCoord(cLng);
  return `<div style="font-family:'Segoe UI',sans-serif;min-width:170px">
    <b style="font-size:.9rem">${esc(name)}</b><br>
    <span style="font-size:.75rem;opacity:.6">${area ? fmtArea(area) : ''}</span>
    <hr style="border:none;border-top:1px solid rgba(255,255,255,.1);margin:5px 0"/>
    <div style="font-family:'Courier New',monospace;font-size:.73rem;opacity:.8;margin-bottom:5px">${coordStr}</div>
    <button onclick="copyText('${coordStr}')"
      style="padding:.2rem .7rem;background:rgba(96,180,255,.2);
      border:1px solid rgba(96,180,255,.35);color:#90c4f0;border-radius:.3rem;
      cursor:pointer;font-size:.7rem;">Copy coords</button>
  </div>`;
}

function esc(s) {
  const d=document.createElement('div');
  d.appendChild(document.createTextNode(s));
  return d.innerHTML;
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
}
</script>
