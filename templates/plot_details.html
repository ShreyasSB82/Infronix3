<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plot Details — UrbanScribe</title>
    <link href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css" rel="stylesheet" />
    <link rel="stylesheet" href="/static/css/unified-header.css">
  <script src="/static/js/unified-header.js?v=20260408" defer></script>
  <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #09111f;
            color: #fff;
            height: 100vh;
            overflow: hidden
        }

        #app {
            display: flex;
            height: 100vh
        }

        #map {
            flex: 1;
            min-width: 0
        }

        #panel {
            width: 380px;
            background: #0f1a30;
            border-left: 1px solid rgba(255, 255, 255, .08);
            padding: 18px;
            overflow: auto
        }

        h1 {
            font-size: 1.1rem;
            margin-bottom: 6px
        }

        .sub {
            font-size: .82rem;
            color: rgba(255, 255, 255, .55);
            margin-bottom: 14px;
            line-height: 1.5
        }

        .card {
            background: rgba(255, 255, 255, .04);
            border: 1px solid rgba(255, 255, 255, .08);
            border-radius: .55rem;
            padding: 12px;
            margin-bottom: 12px
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px
        }

        .row:last-child {
            margin-bottom: 0
        }

        .lbl {
            font-size: .82rem;
            color: rgba(255, 255, 255, .7)
        }

        .val {
            font-size: .82rem;
            color: #9fd1ff;
            font-family: monospace
        }

        .field {
            margin-bottom: 12px
        }

        .field label {
            display: flex;
            justify-content: space-between;
            font-size: .8rem;
            color: rgba(255, 255, 255, .8);
            margin-bottom: 5px
        }

        input[type=range] {
            width: 100%
        }

        .total-ok {
            color: #7ce0a0
        }

        .total-bad {
            color: #ff8f8f
        }

        #generate-btn {
            width: 100%;
            padding: .7rem;
            border: none;
            border-radius: .5rem;
            background: linear-gradient(135deg, #3b82f6, #22c55e);
            color: #fff;
            font-weight: 700;
            cursor: pointer
        }

        #generate-btn:disabled {
            opacity: .45;
            cursor: not-allowed
        }

        #viewer-btn, #interior-btn {
            width: 100%;
            padding: .65rem;
            border: 1px solid rgba(255, 255, 255, .2);
            border-radius: .5rem;
            background: rgba(255, 255, 255, .06);
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            display: none
        }

        #viewer-btn.show, #interior-btn.show {
            display: block
        }

        #legend {
            margin-top: 12px
        }

        .leg {
            display: flex;
            align-items: center;
            gap: 7px;
            margin-bottom: 6px;
            font-size: .78rem;
            color: rgba(255, 255, 255, .7)
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 2px
        }

        .layout-option {
            margin-top: 8px;
            padding: 8px;
            border: 1px solid rgba(255, 255, 255, .12);
            border-radius: .45rem;
            background: rgba(255, 255, 255, .04)
        }

        .layout-option h4 {
            font-size: .82rem;
            margin-bottom: 5px
        }

        .layout-meta {
            font-size: .72rem;
            color: rgba(255, 255, 255, .65);
            margin-bottom: 6px
        }

        .pick-btn {
            padding: .3rem .55rem;
            border: 1px solid rgba(96, 180, 255, .4);
            background: rgba(96, 180, 255, .15);
            color: #9fd1ff;
            border-radius: .35rem;
            cursor: pointer;
            font-size: .72rem
        }

        #toast {
            position: fixed;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%) translateY(70px);
            background: #0f1a30;
            border: 1px solid rgba(96, 180, 255, .35);
            padding: .45rem .95rem;
            border-radius: .45rem;
            font-size: .8rem;
            transition: transform .25s
        }

        #toast.show {
            transform: translateX(-50%) translateY(0)
        }
    </style>
</head>

<body>
    <div id="app">
        <div id="map"></div>
        <aside id="panel">
            <h1>Plot Preferences</h1>
            <p class="sub">Set your site split for planning. Total must be 100% before generating.</p>

            <div class="card">
                <div class="row"><span class="lbl">Selected Plot</span><span class="val" id="plot-name">-</span></div>
                <div class="row"><span class="lbl">Plot Area</span><span class="val" id="plot-area">-</span></div>
                <div class="row"><span class="lbl">Road Facing</span>
                    <select id="road-facing"
                        style="background:#13213c;color:#fff;border:1px solid rgba(255,255,255,.15);border-radius:.35rem;padding:.2rem .4rem">
                        <option value="south">South</option>
                        <option value="north">North</option>
                        <option value="east">East</option>
                        <option value="west">West</option>
                    </select>
                </div>
                <div class="row"><span class="lbl">Floors</span><input id="floors" type="number" min="1" max="20"
                        value="3"
                        style="width:72px;background:#13213c;color:#fff;border:1px solid rgba(255,255,255,.15);border-radius:.35rem;padding:.2rem .4rem" />
                </div>
            </div>

            <div class="card">
                <div class="field">
                    <label><span>Building</span><span id="v-building">60%</span></label>
                    <input id="s-building" type="range" min="0" max="100" value="60" />
                </div>
                <div class="field">
                    <label><span>Greenery</span><span id="v-greenery">20%</span></label>
                    <input id="s-greenery" type="range" min="0" max="100" value="20" />
                </div>
                <div class="field">
                    <label><span>Parking</span><span id="v-parking">10%</span></label>
                    <input id="s-parking" type="range" min="0" max="100" value="10" />
                </div>
                <div class="field">
                    <label><span>Utility</span><span id="v-utility">10%</span></label>
                    <input id="s-utility" type="range" min="0" max="100" value="10" />
                </div>
                <div class="row">
                    <span class="lbl">Total</span>
                    <span class="val total-ok" id="total">100%</span>
                </div>
            </div>

            <button id="generate-btn">Generate Plan</button>
            <button id="viewer-btn">Map View (2D/3D)</button>
            <button id="arch-viewer-btn" style="display:none; width: 100%; padding: .65rem; border: none; border-radius: .5rem; background: #a78bfa; color: #fff; font-weight: 700; cursor: pointer; margin-top: 8px;">🏗 CAD 3D View</button>
            <button id="interior-btn">Interior Layout</button>
            <button id="export-dxf-btn" style="display:none; width: 100%; padding: .65rem; border: 1px solid rgba(96,180,255,.3); border-radius: .5rem; background: rgba(96,180,255,.12); color: #9fd1ff; font-weight: 600; cursor: pointer; margin-top: 8px;">⬇ Export DXF</button>
            <!-- Anti-Gravity BIM Toggle -->
            <button id="ag-toggle-btn" style="display:none; width:100%; padding:.60rem; border:1px solid rgba(167,139,250,.35); border-radius:.5rem; background:rgba(167,139,250,.08); color:#c4b5fd; font-weight:700; cursor:pointer; margin-top:8px; font-size:.82rem; font-family:inherit;">🔮 Enable AG BIM Core</button>
            <div id="layout-options"></div>

            <!-- BBMP Compliance card (shown after generation) -->
            <div id="compliance-card" style="display:none; margin-top:12px; padding:10px 12px; border-radius:.5rem; border:1px solid rgba(255,255,255,.08); background:rgba(0,0,0,.2); font-size:.75rem;">
              <div style="font-weight:700; color:rgba(255,255,255,.55); margin-bottom:8px; letter-spacing:.04em;">BBMP COMPLIANCE</div>
              <div class="row"><span class="lbl">FSI</span><span id="pd-fsi" class="val">–</span></div>
              <div class="row"><span class="lbl">Height</span><span id="pd-ht" class="val">–</span></div>
              <div class="row"><span class="lbl">Infra OK</span><span id="pd-infra" class="val">–</span></div>
              <div style="margin-top:6px; padding-top:6px; border-top:1px solid rgba(255,255,255,.06); color:rgba(255,255,255,.4); font-size:.68rem;">
                💧 Drain <b id="pd-drain">–</b>m &nbsp; 🚰 Water <b id="pd-water">–</b>m &nbsp; 🚽 Sewage <b id="pd-sewage">–</b>m
              </div>
            </div>

            <div id="legend">
                <div class="leg"><span class="dot" style="background:#4A90D9"></span>Building</div>
                <div class="leg"><span class="dot" style="background:#5cb85c"></span>Greenery</div>
                <div class="leg"><span class="dot" style="background:#9B9B9B"></span>Parking</div>
                <div class="leg"><span class="dot" style="background:#c0692a"></span>Utility</div>
            </div>
        </aside>

        <!-- CAD 3D Viewport (three-cad-viewer) -->
        <div id="arch-3d-container" style="display:none; position: absolute; left: 0; top: 0; right: 380px; bottom: 0; z-index: 50; background: #0d0f1a;"></div>
    </div>
    <div id="toast"></div>

    <script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
    <script src="/static/js/earcut.js"></script>
    <script src="/static/js/three-cad-viewer.min.js"></script>
    <script type="module">
        import { initialiseCADViewer, exportDXF } from '/static/js/3d/cadViewerBridge.js?v=5';
        let map, selectedPlot = null, toastTimer, selectedGeneratedLayout = null;
        let isArchMode = false;
        let cadDisplay = null, cadViewer = null, cadReady = false;
        let agEnabled = false;   // AG BIM Core toggle

        function toast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.classList.add('show');
            clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
        }

        function getSplit() {
            return {
                building: +document.getElementById('s-building').value,
                greenery: +document.getElementById('s-greenery').value,
                parking: +document.getElementById('s-parking').value,
                utility: +document.getElementById('s-utility').value,
            };
        }

        function updateTotals() {
            const s = getSplit();
            document.getElementById('v-building').textContent = s.building + '%';
            document.getElementById('v-greenery').textContent = s.greenery + '%';
            document.getElementById('v-parking').textContent = s.parking + '%';
            document.getElementById('v-utility').textContent = s.utility + '%';
            const total = s.building + s.greenery + s.parking + s.utility;
            const totalEl = document.getElementById('total');
            totalEl.textContent = total + '%';
            totalEl.className = 'val ' + (total === 100 ? 'total-ok' : 'total-bad');
            document.getElementById('generate-btn').disabled = total !== 100 || !selectedPlot;
        }

        function bindUIHandlers() {
            ['s-building', 's-greenery', 's-parking', 's-utility'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.addEventListener('input', updateTotals);
            });
            document.getElementById('generate-btn')?.addEventListener('click', generatePlan);
            document.getElementById('viewer-btn')?.addEventListener('click', () => {
                window.location.href = '/viewer';
            });
            document.getElementById('arch-viewer-btn')?.addEventListener('click', toggleArchMode);
            document.getElementById('interior-btn')?.addEventListener('click', () => {
                window.location.href = '/interior-layout';
            });
            document.getElementById('export-dxf-btn')?.addEventListener('click', handleExportDXF);
            document.getElementById('ag-toggle-btn')?.addEventListener('click', toggleAGBIM);
            updateTotals();
        }

        function addLayer(id, data, type, paint, beforeId) {
            if (map.getLayer(id)) map.removeLayer(id);
            if (map.getSource(id)) map.removeSource(id);
            map.addSource(id, { type: 'geojson', data });

            // Ensure plot boundary lines are always on top of fills
            if (!beforeId && id.includes('fill')) {
                if (map.getLayer('selected-plot-line')) beforeId = 'selected-plot-line';
            }
            map.addLayer({ id, type, source: id, paint }, beforeId);
        }

        function renderSelectedPlot() {
            if (!selectedPlot?.coordinates?.length) return;
            const feature = {
                type: 'Feature',
                geometry: { type: 'Polygon', coordinates: [selectedPlot.coordinates.map(c => [c[1], c[0]])] },
                properties: { name: selectedPlot.name || 'Selected Plot' },
            };
            addLayer('selected-plot-fill', feature, 'fill', { 'fill-color': '#60b4ff', 'fill-opacity': 0.13 });
            addLayer('selected-plot-line', feature, 'line', { 'line-color': '#60b4ff', 'line-width': 2 });
            const bounds = feature.geometry.coordinates[0].reduce((b, c) => {
                b[0] = Math.min(b[0], c[0]); b[1] = Math.min(b[1], c[1]);
                b[2] = Math.max(b[2], c[0]); b[3] = Math.max(b[3], c[1]); return b;
            }, [Infinity, Infinity, -Infinity, -Infinity]);
            map.fitBounds([[bounds[0], bounds[1]], [bounds[2], bounds[3]]], { padding: 70 });
            if (selectedPlot.area) {
                document.getElementById('plot-area').textContent = `${Number(selectedPlot.area).toFixed(1)} m²`;
            }
        }

        async function resolveSelectedPlot() {
            const params = new URLSearchParams(window.location.search);
            const plotId = params.get('plot_id');
            if (plotId) {
                try {
                    const res = await fetch('/api/plots');
                    if (res.ok) {
                        const plots = await res.json();
                        const selected = (plots || []).find((p) => p.id === plotId);
                        if (selected?.coordinates?.length) {
                            localStorage.setItem('selectedPlot', JSON.stringify(selected));
                            return selected;
                        }
                    }
                } catch {}
            }

            const rawSelected = localStorage.getItem('selectedPlot');
            if (rawSelected) {
                try {
                    const parsed = JSON.parse(rawSelected);
                    if (parsed?.coordinates?.length) return parsed;
                } catch {}
            }

            const rawGenerated = localStorage.getItem('generatedSitePlan');
            if (rawGenerated) {
                try {
                    const generated = JSON.parse(rawGenerated);
                    if (generated?.selectedPlot?.coordinates?.length) {
                        localStorage.setItem('selectedPlot', JSON.stringify(generated.selectedPlot));
                        return generated.selectedPlot;
                    }
                } catch {}
            }

            try {
                const res = await fetch('/api/plots');
                if (res.ok) {
                    const plots = await res.json();
                    if (Array.isArray(plots) && plots.length && plots[0]?.coordinates?.length) {
                        localStorage.setItem('selectedPlot', JSON.stringify(plots[0]));
                        return plots[0];
                    }
                }
            } catch {}

            return null;
        }

        async function generatePlan() {
            if (!selectedPlot) return;
            const split = getSplit();
            const payload = {
                plot_geojson: {
                    type: 'Feature',
                    geometry: { type: 'Polygon', coordinates: [selectedPlot.coordinates.map(c => [c[1], c[0]])] },
                    properties: {},
                },
                split,
                road_facing: document.getElementById('road-facing').value,
                num_floors: +document.getElementById('floors').value || 3,
            };
            try {
                const res = await fetch('/api/site-plan/preferences-generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Could not generate site plan');

                document.getElementById('plot-area').textContent = data.plot_area_sqm.toFixed(1) + ' m²';
                renderLayoutOptions(data.layouts || [], split, payload);
                toast('3 layout options generated');

                // Auto-preview the first layout immediately
                if (data.layouts && data.layouts.length > 0) {
                    previewLayout(data.layouts[0], split, payload);
                }
            } catch (e) {
                toast(e.message || 'Generation failed');
            }
        }

        function previewLayout(picked, split, payload) {
            selectedGeneratedLayout = picked;
            const fc = picked.zones;
            addLayer('zones-fill', fc, 'fill', { 'fill-color': ['get', 'color'], 'fill-opacity': 0.44 });
            addLayer('zones-line', fc, 'line', { 'line-color': '#ffffff', 'line-width': 1, 'line-opacity': 0.35 });
            
            localStorage.setItem('generatedSitePlan', JSON.stringify({
                selectedPlot,
                split,
                road_facing: payload.road_facing,
                num_floors: payload.num_floors,
                stats: picked.stats,
                zones: picked.zones,
                layout_name: picked.name,
            }));
            
            document.getElementById('viewer-btn').classList.add('show');
            document.getElementById('interior-btn').classList.add('show');
            document.getElementById('arch-viewer-btn').style.display = 'block';
            document.getElementById('export-dxf-btn').style.display = 'block';
            document.getElementById('ag-toggle-btn').style.display = 'block';
            // Reset cad so it re-renders with the new layout next time
            cadReady = false;
            cadDisplay = null;
            // Fetch BBMP compliance for this layout
            fetchComplianceCard(split, payload.num_floors);
        }

        function renderLayoutOptions(layouts, split, payload) {
            const wrap = document.getElementById('layout-options');
            if (!layouts.length) {
                wrap.innerHTML = '<div class="layout-meta">No layouts generated.</div>';
                return;
            }
            wrap.innerHTML = layouts.map((l, i) => `
    <div class="layout-option" id="opt-${i}">
      <h4>${l.name} Layout</h4>
      <div class="layout-meta">
        Building: ${(l.stats?.building_sqm || 0).toFixed(1)} m² ·
        Greenery: ${(l.stats?.greenery_sqm || 0).toFixed(1)} m² ·
        Parking: ${(l.stats?.parking_sqm || 0).toFixed(1)} m²
      </div>
      <button class="pick-btn" data-i="${i}">Preview & Select</button>
    </div>
  `).join('');
            wrap.querySelectorAll('.pick-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const idx = +btn.dataset.i;
                    const picked = layouts[idx];
                    previewLayout(picked, split, payload);
                    toast(`${picked.name} layout previewed`);
                    
                    // Highlight selected option
                    wrap.querySelectorAll('.layout-option').forEach(opt => opt.style.borderColor = 'rgba(255,255,255,.12)');
                    document.getElementById(`opt-${idx}`).style.borderColor = '#60b4ff';
                });
            });
        }

        function toggleArchMode() {
            isArchMode = !isArchMode;
            const container = document.getElementById('arch-3d-container');
            const mapEl = document.getElementById('map');
            const btn = document.getElementById('arch-viewer-btn');

            if (isArchMode) {
                container.style.display = 'block';
                mapEl.style.display = 'none';
                btn.textContent = '✕ Close CAD 3D';
                initCADView();
            } else {
                container.style.display = 'none';
                mapEl.style.display = 'block';
                btn.textContent = '🏗 CAD 3D View';
            }
        }

        function initCADView() {
            if (cadReady) return;
            const container = document.getElementById('arch-3d-container');
            const rawPlan     = localStorage.getItem('generatedSitePlan');
            const rawInterior = localStorage.getItem('interiorFloorPlan');
            const sitePlan  = rawPlan     ? JSON.parse(rawPlan)     : null;
            const interior  = rawInterior ? JSON.parse(rawInterior) : null;

            if (!sitePlan && !interior) {
                toast('No geometry data. Generate a plan first.');
                return;
            }
            const result = initialiseCADViewer(container, sitePlan, interior, agEnabled);
            if (result) {
                ({ display: cadDisplay, viewer: cadViewer } = result);
                cadReady = true;
            }
        }

        function toggleAGBIM() {
            agEnabled = !agEnabled;
            const btn = document.getElementById('ag-toggle-btn');
            if (agEnabled) {
                btn.textContent = '🔮 AG BIM Core: ON — click to disable';
                btn.style.background = '#7c3aed';
                btn.style.borderColor = '#7c3aed';
                btn.style.color = '#fff';
            } else {
                btn.textContent = '🔮 Enable AG BIM Core';
                btn.style.background = 'rgba(167,139,250,.08)';
                btn.style.borderColor = 'rgba(167,139,250,.35)';
                btn.style.color = '#c4b5fd';
            }
            // Force viewer to remount with new AG state
            if (isArchMode && cadReady) {
                cadReady = false;
                cadDisplay = null;
                cadViewer  = null;
                document.getElementById('arch-3d-container').innerHTML = '';
                initCADView();
            }
            toast(agEnabled ? '🔮 Anti-Gravity BIM Core enabled' : 'AG Core disabled');
        }

        async function fetchComplianceCard(split, numFloors) {
            if (!selectedPlot?.coordinates?.length) return;
            try {
                const polygon = {
                    type: 'Polygon',
                    coordinates: [selectedPlot.coordinates.map(c => [c[1], c[0]])]
                };
                const [clRes, comRes] = await Promise.all([
                    fetch('/api/clearance', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ polygon, point:[0,0] }) }),
                    fetch('/api/compliance', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ polygon, prefs: split, zone: 'R1', infra_offsets: {}, floors: numFloors }) }),
                ]);
                if (clRes.ok) {
                    const cl = await clRes.json();
                    document.getElementById('pd-drain').textContent  = cl.drainageOffset?.toFixed(1);
                    document.getElementById('pd-water').textContent  = cl.waterMainOffset?.toFixed(1);
                    document.getElementById('pd-sewage').textContent = cl.sewageTrunkOffset?.toFixed(1);
                    document.getElementById('pd-infra').textContent  = cl.isSelectable ? '✓ OK' : '✗ Conflict';
                    document.getElementById('pd-infra').style.color  = cl.isSelectable ? '#4ade80' : '#f87171';
                }
                if (comRes.ok) {
                    const com = await comRes.json();
                    document.getElementById('pd-fsi').textContent = `${com.computed_fsi} / ${com.max_fsi} ${com.fsi_ok ? '✓' : '✗'}`;
                    document.getElementById('pd-fsi').style.color  = com.fsi_ok ? '#4ade80' : '#f87171';
                    document.getElementById('pd-ht').textContent  = `${(numFloors * 3.2).toFixed(1)}m ≤ ${com.height_ok ? '✓' : '✗'}`;
                    document.getElementById('pd-ht').style.color   = com.height_ok ? '#4ade80' : '#f87171';
                }
                document.getElementById('compliance-card').style.display = 'block';
            } catch (e) { console.warn('[plot-details] Compliance fetch failed:', e); }
        }

        async function handleExportDXF() {
            const btn = document.getElementById('export-dxf-btn');
            btn.textContent = '⏳ Exporting...';
            btn.disabled = true;
            try {
                const rawPlan     = localStorage.getItem('generatedSitePlan');
                const rawInterior = localStorage.getItem('interiorFloorPlan');
                const sitePlan  = rawPlan     ? JSON.parse(rawPlan)     : null;
                const interior  = rawInterior ? JSON.parse(rawInterior) : null;
                await exportDXF(sitePlan, interior, agEnabled);
                btn.textContent = '✔ Downloaded!';
                setTimeout(() => { btn.disabled = false; btn.textContent = '⬇ Export DXF'; }, 3000);
            } catch (err) {
                btn.textContent = '✗ Export Failed';
                btn.disabled = false;
                setTimeout(() => { btn.textContent = '⬇ Export DXF'; }, 3000);
                toast('DXF export failed. Check console.');
            }
        }

        window.addEventListener('DOMContentLoaded', async () => {
            try {
                selectedPlot = await resolveSelectedPlot();
                if (selectedPlot) {
                    document.getElementById('plot-name').textContent = selectedPlot.name || 'Selected Plot';
                } else {
                    toast('No plot found. Create/select a plot from LandMark first.');
                }
            } catch {
                toast('Failed to load plot data.');
            }

            bindUIHandlers();

            try {
                if (!window.maplibregl) throw new Error('Maplibre failed to load');
                map = new maplibregl.Map({
                    container: 'map',
                    style: 'https://demotiles.maplibre.org/style.json',
                    center: [78.9629, 20.5937],
                    zoom: 5,
                });

                map.on('load', () => {
                    if (selectedPlot?.coordinates?.length) {
                        renderSelectedPlot();
                    }
                    updateTotals();
                });
                map.on('error', () => {
                    toast('Map load issue. You can still generate a plan.');
                });
            } catch (err) {
                console.error('Map init failed:', err);
                toast('Map failed to initialize. You can still generate a plan.');
                document.getElementById('map').style.background = '#0b1427';
            }
        });
    </script>
</body>

</html>
