<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Infronix Infrastructure Viewer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Inter, sans-serif; }
    body { background: #0b0f19; color: #fff; overflow: hidden; }
    #map { position: absolute; inset: 0; }
    #loading {
      position: absolute; inset: 0; z-index: 100;
      display: flex; align-items: center; justify-content: center;
      background: #0b0f19; font-size: 1.1rem; font-weight: 600;
    }
    #ui-panel {
      position: absolute; top: 18px; left: 18px; z-index: 50;
      width: 300px; border-radius: 10px; padding: 14px;
      background: rgba(16,24,40,.88); border: 1px solid rgba(255,255,255,.12);
      backdrop-filter: blur(8px);
    }
    h2 { font-size: 1rem; margin-bottom: 12px; color: #60b4ff; }
    .view-toggles { display: flex; gap: 8px; margin-bottom: 14px; }
    .btn {
      flex: 1; border: 1px solid rgba(255,255,255,.2); border-radius: 7px; padding: 8px;
      background: rgba(255,255,255,.06); color: #fff; cursor: pointer; font-size: .84rem;
    }
    .btn.active { background: #60b4ff; color: #00121f; border-color: #60b4ff; font-weight: 700; }
    .layer-item { display: flex; justify-content: space-between; align-items: center; font-size: .82rem; margin-bottom: 8px; }
    .layer-item input { accent-color: #60b4ff; }
    #back-btn {
      position: absolute; top: 18px; right: 18px; z-index: 50; text-decoration: none;
      border: 1px solid rgba(255,255,255,.2); border-radius: 7px; padding: 7px 12px;
      background: rgba(255,255,255,.08); color: #fff; font-size: .82rem;
    }
  </style>
</head>
<body>
  <div id="loading">Loading Geometry Engine...</div>
  <a id="back-btn" href="/plot-details">Exit Viewer</a>
  <div id="ui-panel">
    <h2>Infrastructure Viewer (MapLibre)</h2>
    <div class="view-toggles">
      <button class="btn active" id="btn-2d">2D Plan</button>
      <button class="btn" id="btn-3d">3D Model</button>
      <button class="btn" id="btn-fpv">First Person</button>
    </div>
    <div id="fpv-hint" style="display:none; font-size:.78rem; color:rgba(255,255,255,.5); margin-top:-8px; margin-bottom:12px;">
      Use <b>WASD</b> to walk, <b>Mouse</b> to look.
    </div>
    <div id="layer-controls"></div>
  </div>
  <div id="map"></div>

  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script>
    const loadingEl = document.getElementById("loading");
    const layerState = {};
    let map;

    function setLoadingError(msg) { loadingEl.textContent = msg; }

    function colorForZone(z) {
      const key = (z || "").toLowerCase();
      if (key.includes("building")) return "#4A90D9";
      if (key.includes("green")) return "#5cb85c";
      if (key.includes("park")) return "#9B9B9B";
      if (key.includes("utility")) return "#c0692a";
      return "#60b4ff";
    }

    function centerFromFeatures(features) {
      let sx = 0, sy = 0, count = 0;
      try {
        features.forEach(f => {
          const coords = f.geometry?.coordinates;
          if (!coords) return;
          // Handle Polygon (3D array) or MultiPolygon (4D array)
          const rings = f.geometry.type === "MultiPolygon" ? coords.flat(1) : coords;
          rings.forEach(ring => {
            if (Array.isArray(ring)) {
              ring.forEach(pt => {
                if (Array.isArray(pt) && pt.length >= 2) {
                  sx += pt[0]; sy += pt[1]; count += 1;
                }
              });
            }
          });
        });
      } catch (e) { console.warn("Center calculation failed", e); }
      if (!count || isNaN(sx) || isNaN(sy)) return [80.2707, 13.0827];
      return [sx / count, sy / count];
    }

    function addLayerToggle(label, key, onChange, checked = true) {
      const wrap = document.getElementById("layer-controls");
      const row = document.createElement("div");
      row.className = "layer-item";
      row.innerHTML = `<span>${label}</span><input type="checkbox" ${checked ? "checked" : ""} />`;
      row.querySelector("input").addEventListener("change", e => onChange(e.target.checked));
      wrap.appendChild(row);
      layerState[key] = checked;
    }

    let isFPV = false;
    const keys = {};

    function apply3DMode(mode) {
      // mode: '2d' | '3d' | 'fpv'
      isFPV = (mode === 'fpv');
      
      const pitch = (mode === '2d') ? 0 : (mode === '3d' ? 62 : 82);
      const bearing = (mode === '2d') ? 0 : (mode === '3d' ? -25 : map.getBearing());
      const zoom = (mode === 'fpv') ? 18.5 : (mode === '2d' ? 16 : 17);

      map.easeTo({
        pitch: pitch,
        bearing: bearing,
        zoom: zoom,
        duration: 800
      });

      document.getElementById("btn-2d").classList.toggle("active", mode === '2d');
      document.getElementById("btn-3d").classList.toggle("active", mode === '3d');
      document.getElementById("btn-fpv").classList.toggle("active", mode === 'fpv');
      document.getElementById("fpv-hint").style.display = isFPV ? "block" : "none";

      if (map.getLayer("zones-extrusion")) {
        map.setLayoutProperty("zones-extrusion", "visibility", (mode !== '2d') ? "visible" : "none");
      }
    }

    function setupFPV() {
      window.addEventListener("keydown", e => { keys[e.key.toLowerCase()] = true; });
      window.addEventListener("keyup", e => { keys[e.key.toLowerCase()] = false; });

      function animate() {
        if (isFPV) {
          const camera = map.getFreeCameraOptions();
          const bearing = map.getBearing();
          const rad = (bearing * Math.PI) / 180;
          const step = 0.000008; // ~0.8m per frame
          
          let center = map.getCenter();
          let lng = center.lng;
          let lat = center.lat;

          if (keys['w']) {
            lng += step * Math.sin(rad);
            lat += step * Math.cos(rad);
          }
          if (keys['s']) {
            lng -= step * Math.sin(rad);
            lat -= step * Math.cos(rad);
          }
          if (keys['a']) {
            lng -= step * Math.cos(rad);
            lat += step * Math.sin(rad);
          }
          if (keys['d']) {
            lng += step * Math.cos(rad);
            lat -= step * Math.sin(rad);
          }

          if (keys['w'] || keys['s'] || keys['a'] || keys['d']) {
            map.setCenter([lng, lat]);
          }
        }
        requestAnimationFrame(animate);
      }
      requestAnimationFrame(animate);
    }

    function initViewer() {
      try {
        const raw = localStorage.getItem("generatedSitePlan");
        if (!raw) return setLoadingError("No layout found. Generate and select a layout first.");
        const plan = JSON.parse(raw);
        const features = plan?.zones?.features;
        if (!Array.isArray(features) || !features.length) {
          return setLoadingError("Layout data is empty. Regenerate a layout from Plot Details.");
        }

        const prepared = features.map(f => {
          const zone = f.properties?.zone || "zone";
          const floors = Number(f.properties?.num_floors || plan?.num_floors || plan?.stats?.floors || 1);
          return {
            ...f,
            properties: {
              ...f.properties,
              zone,
              color: f.properties?.color || colorForZone(zone),
              height: zone === "building" ? Math.max(3, floors * 3.2) : 1.5
            }
          };
        });

        map = new maplibregl.Map({
          container: "map",
          style: "https://demotiles.maplibre.org/style.json",
          center: centerFromFeatures(prepared),
          zoom: 16,
          pitch: 0,
          bearing: 0
        });
        map.addControl(new maplibregl.NavigationControl(), "top-right");

        map.on("load", () => {
          map.addSource("zones", {
            type: "geojson",
            data: { type: "FeatureCollection", features: prepared }
          });

          map.addLayer({
            id: "zones-fill",
            type: "fill",
            source: "zones",
            paint: { "fill-color": ["get", "color"], "fill-opacity": 0.35 }
          });
          map.addLayer({
            id: "zones-line",
            type: "line",
            source: "zones",
            paint: { "line-color": ["get", "color"], "line-width": 1.3, "line-opacity": 0.9 }
          });
          map.addLayer({
            id: "zones-extrusion",
            type: "fill-extrusion",
            source: "zones",
            layout: { visibility: "none" },
            paint: {
              "fill-extrusion-color": ["get", "color"],
              "fill-extrusion-height": ["get", "height"],
              "fill-extrusion-base": 0,
              "fill-extrusion-opacity": 0.92
            }
          });

          const zoneList = [...new Set(prepared.map(f => f.properties.zone))];
          addLayerToggle("Roads / Boundaries", "zones-line", v => map.setLayoutProperty("zones-line", "visibility", v ? "visible" : "none"));
          addLayerToggle("Zone Footprints", "zones-fill", v => map.setLayoutProperty("zones-fill", "visibility", v ? "visible" : "none"));
          addLayerToggle("3D Massing", "zones-extrusion", v => map.setLayoutProperty("zones-extrusion", "visibility", v ? "visible" : "none"), false);

          zoneList.forEach(zone => {
            addLayerToggle(zone.charAt(0).toUpperCase() + zone.slice(1), `z-${zone}`, visible => {
              const active = zoneList.filter(z => layerState[`z-${z}`] !== false);
              map.setFilter("zones-fill", ["in", ["get", "zone"], ["literal", active]]);
              map.setFilter("zones-line", ["in", ["get", "zone"], ["literal", active]]);
              map.setFilter("zones-extrusion", ["in", ["get", "zone"], ["literal", active]]);
            });
          });

          document.getElementById("btn-2d").addEventListener("click", () => apply3DMode('2d'));
          document.getElementById("btn-3d").addEventListener("click", () => {
            if (!layerState["zones-extrusion"]) {
              layerState["zones-extrusion"] = true;
              map.setLayoutProperty("zones-extrusion", "visibility", "visible");
            }
            apply3DMode('3d');
          });
          document.getElementById("btn-fpv").addEventListener("click", () => {
            if (!layerState["zones-extrusion"]) {
              layerState["zones-extrusion"] = true;
              map.setLayoutProperty("zones-extrusion", "visibility", "visible");
            }
            apply3DMode('fpv');
          });

          setupFPV();
          loadingEl.style.display = "none";
        });
      } catch (err) {
        console.error("Viewer Init Error:", err);
        setLoadingError(`Error initializing viewer: ${err.message}. Check console for details.`);
      }
    }

    document.addEventListener("DOMContentLoaded", initViewer);
    setTimeout(() => {
      if (loadingEl.style.display !== "none" && loadingEl.textContent === "Loading Geometry Engine...") {
        setLoadingError("Viewer init timed out. Go back, select a layout, then reopen viewer.");
      }
    }, 7000);
  </script>
</body>
</html>
